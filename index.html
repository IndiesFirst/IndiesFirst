<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IndiesFirst</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>IndiesFirst</h1>
      <p>Putting Indie Authors in front of Readers</p>
    </div>
    <button id="authors-button" type="button">Authors</button>
  </header>

  <section class="panel main-layout">
  <div class="search-column">
    <h2>Search Books</h2>
    <input id="search-input" type="text" placeholder="Search by title, author, genre..." />
    <button id="search-button" type="button">Search Books</button>
    <div id="results"></div>
  </div>

  <aside class="sidebar-column">
    <h2>Add a Book</h2>
    <label for="author-search-input">ISBN, Title, or Author</label>
    <input id="author-search-input" type="text" placeholder="ISBN, title, or author">

    <label for="book-url">Book URL</label>
    <input id="book-url" type="url" placeholder="Paste book URL">

    <button id="find-button" type="button">Find Book</button>
    <section id="authors-results"></section>
  </aside>
</section>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
